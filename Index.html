```html
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedResearch AI | Research Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .pdf-viewer-container { 
            height: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f5;
        }
        
        canvas { 
            display: block; 
            margin: 20px auto; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); 
            border-radius: 8px;
            width: 90%; 
            max-width: 800px;
            height: auto !important; 
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
    </style>
</head>
<body class="h-full bg-zinc-50 text-zinc-900 overflow-hidden antialiased">
    <div class="flex h-full w-full">
        <!-- Sidebar -->
        <aside class="w-1/5 min-w-[240px] bg-white border-r border-zinc-200 p-6 flex flex-col shadow-sm z-10">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 bg-zinc-900 rounded-xl flex items-center justify-center">
                    <span class="text-white text-xs font-bold">M</span>
                </div>
                <h1 class="font-semibold text-lg tracking-tight">MedResearch</h1>
            </div>
            
            <button onclick="document.getElementById('pdfUpload').click()" class="flex items-center justify-center gap-2 w-full bg-zinc-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-zinc-800 transition-all active:scale-[0.98]">
                Upload Research
            </button>
            <input type="file" id="pdfUpload" class="hidden" accept="application/pdf" multiple>

            <div class="mt-8 flex-1 overflow-y-auto custom-scrollbar space-y-1" id="docList">
                <p class="text-[10px] text-zinc-400 uppercase font-bold tracking-widest mb-4">Library</p>
            </div>
        </aside>

        <!-- PDF Viewer Panel -->
        <main class="flex-1 flex flex-col bg-zinc-100 min-w-0">
            <header class="h-16 border-b border-zinc-200 bg-white/90 backdrop-blur-md flex items-center px-8 text-sm font-medium text-zinc-600 justify-between">
                <span id="activeDocTitle" class="truncate">Select a document to review</span>
            </header>
            <div id="pdfViewer" class="pdf-viewer-container">
                <div class="flex flex-col items-center justify-center h-full text-zinc-400">
                    <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center mb-6 border border-zinc-200">
                        <svg class="w-10 h-10 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
                    </div>
                    <p class="text-sm font-medium">Select a document from your library</p>
                </div>
            </div>
        </main>

        <!-- Chat Sidebar -->
        <section class="w-1/4 min-w-[320px] bg-white border-l border-zinc-200 flex flex-col shadow-sm">
            <div class="p-5 border-b border-zinc-100">
                <input type="password" id="apiKey" placeholder="Enter Gemini API Key..." class="w-full text-sm pl-4 pr-10 py-2.5 bg-zinc-50 border border-zinc-200 rounded-xl focus:ring-2 focus:ring-zinc-900/10 outline-none">
                <div id="statusIndicator" class="flex items-center gap-2 text-[11px] font-medium text-zinc-400 mt-3">
                    <span class="w-1.5 h-1.5 rounded-full bg-zinc-300"></span> API Status: Disconnected
                </div>
            </div>
            
            <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                <div class="text-center text-zinc-400 text-xs py-10">AI session is ready</div>
            </div>

            <div class="p-5 border-t border-zinc-100 bg-white">
                <input type="text" id="userInput" class="w-full px-4 py-3 bg-zinc-100 rounded-xl text-sm outline-none focus:bg-white focus:ring-2 focus:ring-zinc-900/10 transition-all" placeholder="Ask about the paper...">
            </div>
        </section>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const pdfViewer = document.getElementById('pdfViewer');
        const activeDocTitle = document.getElementById('activeDocTitle');
        const docList = document.getElementById('docList');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKey');

        let activeDocText = "";

        document.getElementById('pdfUpload').addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(file => {
                const item = document.createElement('div');
                item.className = 'group flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-50 cursor-pointer transition-colors';
                item.innerHTML = `<div class="w-8 h-8 rounded-lg bg-zinc-100 flex items-center justify-center text-zinc-500"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 0 0 2-2V9.414a1 1 0 0 0-.293-.707l-5.414-5.414A1 1 0 0 0 12.586 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2z"/></svg></div><span class="text-sm text-zinc-700 truncate font-medium">${file.name}</span>`;
                item.onclick = () => renderPDF(file);
                docList.appendChild(item);
            });
        });

        async function renderPDF(file) {
            activeDocTitle.textContent = file.name;
            pdfViewer.innerHTML = '<div class="text-sm text-zinc-400 animate-pulse mt-20">Processing document...</div>';
            
            const reader = new FileReader();
            reader.onload = async () => {
                const typedarray = new Uint8Array(reader.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pdfViewer.innerHTML = '';
                
                activeDocText = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    activeDocText += textContent.items.map(s => s.str).join(' ');

                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    pdfViewer.appendChild(canvas);
                    await page.render({ canvasContext: context, viewport }).promise;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        userInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && userInput.value.trim()) {
                const question = userInput.value;
                userInput.value = '';
                chatBox.innerHTML += `<div class="text-sm bg-zinc-900 text-white p-3 rounded-xl ml-auto max-w-[80%]">${question}</div>`;
                
                const apiKey = apiKeyInput.value;
                if (!apiKey) { chatBox.innerHTML += `<div class="text-xs text-red-500">Please enter a valid API key.</div>`; return; }

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: `Use the context: \n\n${activeDocText.substring(0, 15000)} \n\nQuestion: ${question}` }] }] 
                        })
                    });
                    
                    const data = await response.json();
                    if (!response.ok) {
                        const errorMsg = data.error?.message || 'Unknown API Error';
                        throw new Error(errorMsg);
                    }
                    
                    const answer = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="text-sm bg-zinc-100 text-zinc-800 p-3 rounded-xl">${answer}</div>`;
                } catch (error) { 
                    chatBox.innerHTML += `<div class="text-xs text-red-500 p-3 border border-red-200 rounded-xl bg-red-50 mt-2">
                        <strong>API Error:</strong> ${error.message}<br><br>
                        <em>Tip: If this is a rate limit error, please wait a few seconds and try again.</em>
                    </div>`; 
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        apiKeyInput.addEventListener('input', (e) => {
            const connected = e.target.value.length > 20;
            document.getElementById('statusIndicator').innerHTML = `<span class="w-1.5 h-1.5 rounded-full ${connected ? 'bg-emerald-500' : 'bg-zinc-300'}"></span> API Status: ${connected ? 'Connected' : 'Disconnected'}`;
        });
    </script>
</body>
</html>
